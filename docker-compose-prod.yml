services:
  web-app:
    image: parzivalxix/alternance-tah-les-fous:latest
    restart: always
    ports:
        - "80:5000"
    depends_on:
      - db

  db:
    image: mysql:9.6
    restart: always
    env_file:
      - .env
    ports:
        - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d