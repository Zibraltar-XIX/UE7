name: pipeline
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install flake8
        run: pip install flake8
      - name: run flake8
        uses: py-actions/flake8@v2
        with:
          ignore: "E501,E401,W291,E128"
          max-line-length: "100"
          path: "./python/app.py"

  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-bandit:
    name: bandit
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install bandit
        run: pip install bandit
      - name: run bandit
        run: bandit -r ./python/app.py --severity-level=high 
  
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    needs: sast-bandit
    steps:
      - uses: actions/checkout@v6
      - name: setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install pip-audit
        run: pip install pip-audit
      - name: run pip-audit
        run: pip-audit -r ./python/requirements.txt

  build:
    name: build docker image
    runs-on: ubuntu-latest
    needs: pip-audit
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t ue7-app:latest -f ./app/Dockerfile .

  grype:
    name: scan grype
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Install Grype
        run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
      - name: Scan Docker Image with Grype
        run: grype ./app

  nikto:
    name: scan nikto
    runs-on: ubuntu-latest
    needs: grype
    steps:
      - uses: actions/checkout@v6
      - name: install nikto
        run: sudo apt-get update && sudo apt-get install -y nikto
      - name: run nikto
        run: nikto -h http://localhost:5000