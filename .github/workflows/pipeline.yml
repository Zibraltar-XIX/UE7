name: pipeline
on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.py'
  workflow_dispatch:
jobs:

  security-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FLAKE8 :
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install flake8
        run: pip install flake8
      - name: run flake8
        uses: py-actions/flake8@v2
        with:
          ignore: "E501,E401,W291,W293,E128,E266,E302,E203,E303"
          max-line-length: "100"
          path: "./python/app.py"


      #gitleaks :
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #semgrep :
      - name: install semgrep
        run: python3 -m pip install semgrep
      - name: run semgrep
        run: semgrep --config .semgrep/custom-rules.yml --error .

      #bandit :
      - name: install bandit
        run: pip install bandit
      - name: run bandit
        run: bandit -r ./python/app.py --severity-level=high 

      #pip-audit :
      - name: install pip-audit
        run: pip install pip-audit
      - name: run pip-audit
        run: pip-audit -r ./python/requirements.txt

  build:
    name: build image
    runs-on: ubuntu-latest
    needs: security-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: create .env file
        run: |
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
      - name: verify .env
        run: cat .env | cut -d'=' -f1
      - name: build image
        run: docker build -t ue7-app:latest -f ./app/Dockerfile .

      - name: Install Grype
        run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
      - name: Scan Docker Image with Grype
        run: grype ue7-app:latest
      
      - run: docker compose up -d --build
      - name: check le conteneur
        run: docker ps -a
      - name: Curl inside web container
        run: |
          docker exec ue7-web-app-1 python - <<'PY'
          import urllib.request
          r = urllib.request.urlopen("http://127.0.0.1:5000/", timeout=5)
          print(r.status)
          print(r.read(200))
          PY
      - name: logs app web
        if: always()
        run: docker compose logs --no-color web-app

      - name: logs db
        if: always()
        run: docker compose logs --no-color db

      - name: inspection app web
        if: always()
        run: docker inspect ue7-web-app-1 --format='{{.RestartCount}}'

      - name: docker log pour erreur
        if: always()
        run: docker compose logs --no-color
      - uses: thereisnotime/action-nikto@master
        with:
          url: "http://127.0.0.1:5000"

      - name: push ghcr
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=4.0
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag ue7-app:latest ghcr.io/zibraltar-xix/alternance-tah-les-fous:$VERSION
          docker push ghcr.io/zibraltar-xix/alternance-tah-les-fous:$VERSION
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker tag ue7-app:latest parzivalxix/alternance-tah-les-fous:$VERSION
          docker push parzivalxix/alternance-tah-les-fous:$VERSION
