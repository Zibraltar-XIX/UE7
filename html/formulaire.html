<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire</title>
    <link rel="stylesheet" href="../css/formulaire.css">
</head>
<body>
    <div class="container">
        <h1>Formulaire</h1>
        <form action="#" method="post" enctype="multipart/form-data">

            <div class="form-row">
                <div class="form-group">
                    <label for="nom_poste">Nom du poste</label>
                    <input type="text" id="nom_poste" name="nom_poste" required>
                </div>

                <div class="form-group">
                    <label for="lieu">Lieux (séparez par des virgules)</label>
                    <input type="text" id="lieu" name="lieu" placeholder="Ex: Paris, Lyon, Bordeaux">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="contrat">Type de contrat</label>
                    <select id="contrat" name="contrat">
                        <option value="">Sélectionnez un type</option>
                        <option value="alternance">Alternance</option>
                        <option value="stage">Stage</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="include_contact" name="include_contact">
                    <label for="include_contact">Inclure mes coordonnées</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cv">CV</label>
                    <input type="file" id="cv" name="cv">
                </div>

                <div class="form-group">
                    <label for="lettre_motivation">Lettre de motivation</label>
                    <input type="file" id="lettre_motivation" name="lettre_motivation">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description du poste</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <button type="submit">Envoyer</button>
        </form>
    </div>
</body>
</html>
