services:
  web-app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "80:5000"
    depends_on:
      - db
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  db:
    image: mysql:9.6
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    cap_drop:
      - ALL
    cap_add:
      - SYS_NICE
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
