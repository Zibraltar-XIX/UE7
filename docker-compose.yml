services:
  web-app:
    image: alternance-tah-les-fous:latest
    restart: always
    ports:
        - "80:5000"

  db:
    image: mysql:9.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: alternance
      MYSQL_PASSWORD: mdptahlesfous
    ports:
        - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
