<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Connexion</title>
        <link rel="stylesheet" href="/site/css/login.css">
        <link rel="stylesheet" href="/site/css/main.css">
        <link rel="icon" href="/site/src/logo tah les fous.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet">
    </head>
    <body>
        <div class="box_formulaire">
            <div>
                <img src="/site/src/login-illustration.png"
                    alt="login illustration">
            </div>
            <div class="formulaire_principal">
                <h1>Connexion</h1>
                <form action="/login" method="post">
                    <div class="champs-formulaire">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="champs-formulaire">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password"
                            required>
                    </div>

                    <button type="submit">Se connecter</button>
                </form>
            </div>
        </div>
        <div class="background">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        {% if error %}
        <script>
            alert({{ error|tojson }});
        </script>
        {% endif %}

        <script src="https://cdn.jsdelivr.net/npm/js-cookie@3/dist/js.cookie.min.js"></script>

    </body>
</html>
