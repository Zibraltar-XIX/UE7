<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="container">
        <h1>Inscription</h1>
        <form id="registerForm">

            <div class="form-group user-type-group">
                <label>Je suis :</label>
                <div class="radio-options">
                    <label>
                        <input type="radio" name="user_type" value="student" checked onclick="toggleField('student')"> Étudiant
                    </label>
                    <label>
                        <input type="radio" name="user_type" value="company" onclick="toggleField('company')"> Entreprise
                    </label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="numero">Numéro de téléphone</label>
                    <input type="tel" id="numero" name="numero" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Date de naissance</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="form-group">
                    <label for="ecole" id="label_ecole">École</label>
                    <input type="text" id="ecole" name="ecole">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
            </div>

            <div id="message" style="display:none; margin-top:15px; padding:10px; border-radius:4px;"></div>

            <button type="submit">S'inscrire</button>
        </form>
    </div>

    <script>
        function toggleField(type) {
            const label = document.getElementById('label_ecole');
            const input = document.getElementById('ecole');

            if (type === 'company') {
                label.textContent = 'Nom de l\'entreprise';
                input.placeholder = 'Ex: Ma Société SAS';
            } else {
                label.textContent = 'École';
                input.placeholder = '';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validation des mots de passe
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas!', 'error');
                return;
            }

            // Récupérer les données du formulaire
            const formData = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                numero: document.getElementById('numero').value,
                user_type: document.querySelector('input[name="user_type"]:checked').value,
                password: password,
                adresse: document.getElementById('ecole').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    showMessage('Inscription réussie!', 'success');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage('Erreur lors de l\'inscription', 'error');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('Une erreur est survenue', 'error');
            }
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = type === 'success' ? '#d4edda' : '#f8d7da';
            messageDiv.style.color = type === 'success' ? '#155724' : '#721c24';
            messageDiv.style.borderColor = type === 'success' ? '#c3e6cb' : '#f5c6cb';
            messageDiv.style.border = '1px solid';
        }
    </script>
</body>
</html>
