<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <!-- On garde les liens CSS originaux qui marchent pour le visuel -->
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../src/logo tah les fous.png">
</head>
<body>
<div class="box_inscription">
    <div class="register_illustration">
        <img src="../src/register-illustration.png"
             alt="register_illustration">
    </div>
    <div class="section_input">
        <h1>Inscription</h1>

        <!-- Changement ici : suppression de l'event JS, on passe en POST standard vers /register -->
        <form id="formulaire_inscription" action="/register" method="post">

            <div class="selection_formualire">
                <label>Je suis :</label>
                <div class="selection_input">
                    <label>
                        <input type="radio" name="user_type"
                               value="student"
                               checked onclick="toggleField('student')">
                        Étudiant
                    </label>
                    <label>
                        <input type="radio" name="user_type"
                               value="company"
                               onclick="toggleField('company')"> Entreprise
                    </label>
                </div>
            </div>

            <div class="selection_input">
                <div class="input_group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="input_group">
                    <label for="prenom">Prénom</label>
                    <input type="text" class="input" name="prenom" required>
                </div>
            </div>

            <div class="selection_input">
                <div class="input_group">
                    <label for="email">Email</label>
                    <input type="email" class="input" name="email" required>
                </div>
                <div class="input_group">
                    <label for="numero">Numéro de téléphone</label>
                    <input type="tel" class="input" id="numero" name="numero" required>
                </div>
            </div>

            <div class="selection_input">
                <div class="input_group">
                    <label for="dob">Date de naissance</label>
                    <input type="date" class="input" id="dob" name="dob" required>
                </div>
                <div class="input_group">
                    <label for="ecole" id="label_ecole">École</label>
                    <input type="text" class="input" id="ecole" name="ecole">
                </div>
            </div>

            <div class="selection_input">
                <div class="input_group">
                    <label for="password">Mot de passe</label>
                    <input type="password" class="input" id="password" name="password" required>
                </div>
                <div class="input_group">
                    <label for="confirm_password">Confirmer mot de passe</label>
                    <input type="password" class="input" name="confirm_password" required>
                </div>
            </div>

            <!-- Ce div ne sert plus à rien techniquement mais je le laisse pour ne pas casser le CSS au cas où -->
            <div id="message" style="display:none; margin-top:15px;"></div>

            <button type="submit">S'inscrire</button>
        </form>
    </div>
</div>

<div class="background">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span>
</div>

<!-- Logique Backend : Affichage de l'erreur via Jinja/Alert (comme login) -->
<script>
    alert({{ error|tojson }});
</script>

<script>
    // On garde juste cette fonction utile pour le visuel du formulaire
    function toggleField(type) {
        const label = document.getElementById('label_ecole');
        const input = document.getElementById('ecole');
        if (type === 'company') {
            label.textContent = "Nom de l'entreprise";
            input.placeholder = 'Ex: Ma Société SAS';
        } else {
            label.textContent = 'École';
            input.placeholder = '';
        }
    }
</script>
</body>
</html>
